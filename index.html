<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caption Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- 主内容行 -->
      <div id="main-row">
        <!-- 左侧控制面板 -->
        <aside id="panel">
          <h1>Caption Generator</h1>

          <section class="panel-section">
            <label for="lrc-input">LRC 歌词</label>
            <textarea id="lrc-input" rows="10" placeholder="粘贴 .lrc 内容，或点击下方上传"></textarea>
            <button id="lrc-upload-btn" type="button">上传 .lrc 文件</button>
            <input id="lrc-file" type="file" accept=".lrc,.txt" hidden />
          </section>

          <section class="panel-section">
            <div class="row" id="random-row">
              <label class="checkbox-label">
                <input id="random-enable" type="checkbox" checked />
                启用随机特效
              </label>
              <div id="seed-row" class="seed-row-inner">
                <input id="seed-input" type="text" placeholder="留空则随机" />
                <button id="reseed-btn" type="button" title="随机种子">🎲</button>
              </div>
            </div>
          </section>

          <section class="panel-section">
            <div class="row">
              <label for="resolution-select">画布尺寸</label>
              <select id="resolution-select" style="flex:1; width:auto;">
                <option value="1920x1080">1920×1080 (16:9)</option>
                <option value="1080x1920">1080×1920 (9:16)</option>
                <option value="1080x1080">1080×1080 (1:1)</option>
                <option value="1280x720">1280×720 (720p)</option>
              </select>
            </div>
          </section>

          <section class="panel-section">
            <label>字幕样式</label>
            <div class="row">
              <label for="bg-color">背景色</label>
              <input id="bg-color" type="color" value="#000000" />
            </div>
            <div class="row">
              <label for="fill-color">字色</label>
              <input id="fill-color" type="color" value="#ffffff" />
              <label for="stroke-color">描边色</label>
              <input id="stroke-color" type="color" value="#000000" />
            </div>
            <div class="row">
              <label for="stroke-width">描边</label>
              <input id="stroke-width" type="range" min="0" max="8" step="0.5" value="0" />
              <span id="stroke-width-val">0</span>
            </div>
            <div class="row">
              <label for="font-select">字体</label>
              <select id="font-select" style="flex:1; width:auto;"></select>
            </div>
          </section>

          <section class="panel-section">
            <button id="build-btn" type="button" class="primary">生成预览</button>
          </section>

          <section class="panel-section">
            <label>导出</label>
            <div class="row">
              <label class="checkbox-label">
                <input id="export-transparent" type="checkbox" checked />
                透明背景（仅文字）
              </label>
            </div>
            <div class="row">
              <button id="export-png-btn" type="button">PNG 帧</button>
              <button id="export-webm-btn" type="button">WebM 视频</button>
              <button id="export-mov-btn" type="button">MOV 视频</button>
            </div>
            <div id="export-progress" hidden>
              <progress id="export-bar" max="100" value="0"></progress>
              <span id="export-label">0%</span>
              <button id="export-cancel-btn" type="button">中断</button>
            </div>
            <div id="export-mov-note" hidden>
              <span>正在加载 ffmpeg.wasm (~30MB)…</span>
            </div>
          </section>
        </aside>

        <!-- 预览区 -->
        <main id="preview-area">
          <div id="line-props-panel" hidden></div>

          <!-- 全局样式面板 -->
          <div id="global-style-panel" hidden>
            <div class="gsp-title">全局样式</div>
            <div class="le-row">
              <label class="le-label">字体</label>
              <select id="gsp-font" class="le-select"></select>
            </div>
            <div class="le-row">
              <label class="le-label">对齐</label>
              <div class="le-align-group" id="gsp-align-group">
                <button type="button" class="le-align-btn" data-val="left">左</button>
                <button type="button" class="le-align-btn active" data-val="center">中</button>
                <button type="button" class="le-align-btn" data-val="right">右</button>
              </div>
            </div>
            <div class="le-row">
              <label class="le-label">字色</label>
              <input id="gsp-fill-color" type="color" class="le-color" value="#ffffff" />
              <label class="le-label" style="margin-left:4px;">描边色</label>
              <input id="gsp-stroke-color" type="color" class="le-color" value="#000000" />
            </div>
            <div class="le-row">
              <label class="le-label">描边粗细</label>
              <input id="gsp-stroke-width" type="range" class="le-slider" min="0" max="16" step="0.5" value="0" />
              <input id="gsp-stroke-width-num" type="number" class="le-num" min="0" max="16" step="0.5" value="0" />
              <span class="le-unit">px</span>
            </div>
            <button id="gsp-apply-btn" type="button" class="primary" style="margin-top:2px;">应用于所有字幕</button>
          </div>

          <div id="canvas-wrap">
            <canvas id="main-canvas"></canvas>
          </div>
          <div id="transport">
            <button id="play-pause-btn" type="button">▶ 播放</button>
            <input id="seek-bar" type="range" min="0" max="100" step="0.1" value="0" />
            <span id="time-display">0.0 / 0.0 s</span>
          </div>
        </main>

        <!-- 右侧逐行编辑面板 -->
        <aside id="right-panel" hidden>
          <div id="right-panel-resize" title="拖拽调整宽度"></div>
          <div id="right-panel-header">
            <span class="right-panel-title">逐行编辑</span>
          </div>
          <div id="line-editor-list"></div>
        </aside>
      </div>

      <!-- 时间轴区域（全宽） -->
      <div id="timeline">
        <!-- 左侧轨道标签 -->
        <div id="tl-labels">
          <div class="tl-ruler-space"></div>
          <div class="tl-track-label">
            <span class="tl-track-icon">🖼</span>
            <button class="tl-add-btn" id="tl-media-add" title="添加图片">+</button>
          </div>
          <div class="tl-track-label">
            <span class="tl-track-icon">💬</span>
          </div>
          <div class="tl-track-label">
            <span class="tl-track-icon">🎵</span>
            <button class="tl-add-btn" id="tl-audio-add" title="添加音频">+</button>
          </div>
        </div>

        <!-- 右侧可滚动内容区 -->
        <div id="tl-content-area">
          <div id="tl-inner">
            <div id="tl-ruler"></div>
            <div class="tl-track-row">
              <div class="tl-track-content" id="tl-media-content"></div>
            </div>
            <div class="tl-track-row">
              <div class="tl-track-content" id="tl-caption-content"></div>
            </div>
            <div class="tl-track-row">
              <div class="tl-track-content" id="tl-audio-content"></div>
            </div>
            <!-- 播放头 -->
            <div id="tl-playhead">
              <div id="tl-playhead-handle"></div>
            </div>
          </div>
        </div>

        <!-- 隐藏文件输入 -->
        <input type="file" id="tl-media-file" accept="image/*" multiple hidden />
        <input type="file" id="tl-audio-file" accept="audio/*" multiple hidden />
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
